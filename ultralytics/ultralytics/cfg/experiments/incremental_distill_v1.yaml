# Incremental detection baseline (v1).

task: detect
mode: train

# Student setup
model: yolov8n.pt
data: ultralytics/cfg/datasets/ship_oiltank_joint.yaml
epochs: 100
batch: 16
imgsz: 640
workers: 8
device: 0
project: runs/detect
name: incremental_baseline_v1
exist_ok: False
val: True
plots: True

# Experiment mode:
#   naive_finetune | replay_only
experiment_mode: naive_finetune

# Replay (v1 interface)
enable_replay: False
replay_data:

# Sliding-window slicing
enable_slicing: True
slice_size: 512
slice_overlap: 0.25
min_box_keep_ratio: 0.5
empty_tile_keep_prob: 0.3
cache_slices: True
slice_cache_dir:

# Extra validation splits
old_val_data: ultralytics/cfg/datasets/ship_old_eval.yaml
new_val_data: ultralytics/cfg/datasets/oiltank_new_eval.yaml
joint_val_data: ultralytics/cfg/datasets/ship_oiltank_joint.yaml
